
[colors]
background = #06010C
background-alt = #303091
foreground = #a4c4e9
foreground-alt = #a4c4e9

blue = #5953AA
cyan = #9067D3
green = #512E9D
yellow = #374CB2
red = #303091
purple = #675AD3
orange = #303091

[bar/main]
width = 100%
height = 28
radius = 0
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.blue}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

tray-position = none
wm-restack = i3
enable-ipc = true

modules-left = arch i3
modules-center = window
modules-right = tray audio battery clock power

[module/arch]
type = custom/text
content = ’īā
content-foreground = ${colors.blue}
content-padding = 1
click-left = ~/.config/scripts/rofi.sh
click-middle = ~/.config/scripts/rofi.sh
click-right = ~/.config/scripts/rofi.sh

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

ws-icon-default = ’äæ

label-focused = %name%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.green}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

[module/window]
type = internal/xwindow
label = %title%
label-maxlen = 35
label-ellipsis = true
label-padding = 1
label-foreground = ${colors.cyan}

[module/audio]
type = internal/pulseaudio
interval = 5
format-volume = ’Ć©  <label-volume>
label-volume = %percentage%%

format-muted = ’æ” muted

; -------- Clock --------
[module/clock]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M

label = ’ĆŚ %date%
label-foreground = #374CB2

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
poll-interval = 5
full-at = 98

format-charging = ’ā¦ <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = ’ēĆ full

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ

[module/tray]
type = internal/tray
tray-size = 18
tray-spacing = 6
tray-padding = 2
tray-background = ${colors.background}

; -------- Power --------
[module/power]
type = custom/text
content = ŌÅ╗
content-foreground = ${colors.red}
content-padding = 1

click-left = ~/.config/scripts/powermenu-alt.sh

[settings]
screenchange-reload = true
pseudo-transparency = false
