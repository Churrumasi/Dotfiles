########################################
# PICOM CONFIG - i3 GLASS STYLE
########################################

backend = "glx";
vsync = true;
use-damage = true;
use-ewmh-active-win = true;

########################################
# SHADOW
########################################

shadow = true;
shadow-radius = 15;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.30;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'xwinwrap'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

########################################
# OPACITY
########################################

active-opacity = 0.92;
inactive-opacity = 0.75;
frame-opacity = 0.70;

opacity-rule = [
  "100:class_g = 'xwinwrap'",
  "95:class_g = 'Polybar'",
  "90:class_g = 'kitty'",
  "100:class_g = 'Rofi'",
  "100:fullscreen"
];

########################################
# BLUR
########################################

blur-method = "dual_kawase";
blur-strength = 6;

blur-background = true;
blur-background-frame = true;

blur-background-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'xwinwrap'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'fullscreen'"
];

########################################
# ROUNDED CORNERS
########################################

corner-radius = 8;

########################################
# ANIMATIONS
########################################

fading = true;
fade-delta = 8;
fade-in-step = 0.05;
fade-out-step = 0.05;

fade-exclude = [
  "class_g = 'xwinwrap'"
];

########################################
# PERFORMANCE
########################################

unredir-if-possible = false;