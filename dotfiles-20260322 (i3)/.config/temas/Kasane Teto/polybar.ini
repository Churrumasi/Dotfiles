
[colors]
background = #030316
background-alt = #D21F5F
foreground = #ebcfc9
foreground-alt = #ebcfc9

blue = #5F958C
cyan = #B2BAAE
green = #9E445F
yellow = #7D7E80
red = #D21F5F
purple = #65A89C
orange = #D21F5F

[bar/main]
width = 100%
height = 28
radius = 0
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.blue}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

tray-position = none
wm-restack = i3
enable-ipc = true

modules-left = arch i3
modules-center = window
modules-right = tray audio battery clock

[module/arch]
type = custom/text
content = 
content-foreground = ${colors.blue}
content-padding = 1
click-left = ~/.config/scripts/rofi.sh
click-middle = ~/.config/scripts/rofi.sh
click-right = ~/.config/scripts/rofi.sh

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

ws-icon-default = 

label-focused = %name%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.blue}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

[module/window]
type = internal/xwindow
label = %title%
label-maxlen = 35
label-ellipsis = true
label-padding = 1
label-foreground = ${colors.cyan}

[module/audio]
type = internal/pulseaudio
interval = 5
format-volume =   <label-volume>
label-volume = %percentage%%

format-muted =  muted

; -------- Clock --------
[module/clock]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M

label =  %date%
label-foreground = #7D7E80

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
poll-interval = 5
full-at = 98

format-charging =  <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full =  full

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

[module/tray]
type = internal/tray
tray-size = 18
tray-spacing = 6
tray-padding = 2
tray-background = ${colors.background-alt}

[settings]
screenchange-reload = true
pseudo-transparency = false
